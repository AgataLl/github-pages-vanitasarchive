<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vanitas Archive</title>

  <!-- FUENTES -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       RESET & BASE
    ========================================= */
    *{ margin:0; padding:0; box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body {
      background:#050505;
      color:#d8d2ca;
      font-family:'Cormorant Garamond', serif;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      /* Cursor con la vela pixel art */
      cursor: url('4212613_2.png') 32 5, auto;
    }

    a, .book, .entry, button {
      cursor: url('4212613_2.png') 32 5, pointer;
    }

    /* EFECTOS AMBIENTALES */
    .darkness{
      position:fixed; inset:0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.9) 100%);
      pointer-events:none; z-index:1;
    }

    .cursor-glow{
      position:fixed; width:500px; height:500px; border-radius:50%;
      background:radial-gradient(circle, rgba(255,200,100,0.15) 0%, transparent 70%);
      pointer-events:none; transform:translate(-50%,-50%);
      z-index:2; mix-blend-mode:screen; filter:blur(30px);
      animation:flicker 3s infinite alternate;
    }

    @keyframes flicker{
      0% { opacity:0.8; transform:translate(-50%,-50%) scale(1); }
      100% { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
    }

    /* SISTEMA DE POLVO ANIMADO */
    .dust-container {
      position: fixed; inset: 0; pointer-events: none; z-index: 3;
    }

    .particle {
      position: absolute; background: rgba(255, 255, 255, 0.2);
      border-radius: 50%; pointer-events: none;
      animation: float-particle linear infinite;
    }

    @keyframes float-particle {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }

    /* NAVEGACIÓN */
    nav{
      position:fixed; top:0; width:100%; padding:1.2rem 2rem;
      backdrop-filter:blur(10px); background:rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(191,155,107,0.1); z-index:999;
    }
    nav ul{ display:flex; justify-content:center; gap:2rem; list-style:none; }
    nav a{
      text-decoration:none; color:#cfc6bc; font-family:'IBM Plex Mono', monospace;
      font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; transition:0.3s;
    }
    nav a:hover{ color:#f0e2c6; text-shadow: 0 0 8px rgba(240,226,198,0.5); }

    /* HERO */
    header{
      height:100vh; display:flex; flex-direction:column; justify-content:center;
      align-items:center; text-align:center; position:relative; z-index:4;
    }
    h1{
      font-size:clamp(3rem, 8vw, 6rem); font-weight:300; letter-spacing:0.35em;
      text-transform:uppercase; color:#f3e7d5;
      text-shadow: 0 0 20px rgba(0,0,0,1);
    }
    .subtitle{ margin-top:1.5rem; max-width:600px; font-size:1.2rem; color:#a79a8d; font-style: italic; }

    /* CONTENIDO */
    main{ width:min(1200px, 90%); margin:auto; padding:4rem 0; position:relative; z-index:4; }
    .entry{
      background: rgba(15, 12, 10, 0.8); border: 1px solid rgba(191,155,107,0.1);
      padding:3rem; margin-bottom:4rem; backdrop-filter: blur(5px);
    }
    .entry h3{ font-size:2.2rem; margin-bottom:1rem; color:#f0e8df; }
    .entry p{ line-height:1.8; font-size:1.1rem; color:#c9c0b8; }

    /* REPRODUCTOR */
    .music-player{
      position:fixed; bottom:20px; right:20px; width:300px; padding:1rem;
      z-index:9999; background:rgba(10,8,6,0.9);
      border: 1px solid rgba(191,155,107,0.2); backdrop-filter:blur(15px);
    }
    .music-header{ display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
    .vinyl{
      width:40px; height:40px; border-radius:50%;
      background: radial-gradient(circle, #222 25%, #000 100%);
      border: 1px solid rgba(191,155,107,0.3); animation:spin 10s linear infinite;
      animation-play-state: paused;
    }
    @keyframes spin{ from{transform:rotate(0)} to{transform:rotate(360deg)} }
    audio {
      width: 100%; height: 30px;
      filter: sepia(100%) brightness(0.6) contrast(1.5) invert(100%);
      opacity: 0.5;
    }

    footer{ padding:4rem; text-align:center; opacity:0.4; font-family:'IBM Plex Mono', monospace; font-size:0.7rem; }
  </style>
</head>
<body>

  <div class="darkness"></div>
  <div class="cursor-glow"></div>
  <div class="dust-container" id="dust-container"></div>

  <nav>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#archive">Archive</a></li>
    </ul>
  </nav>

  <header>
    <h1>Vanitas Archive</h1>
    <p class="subtitle">"Memento Mori, Memento Vivere"</p>
  </header>

  <main>
    <section id="about">
      <div class="entry">
        <h3>El Polvo del Tiempo</h3>
        <p>Has entrado en un espacio donde los bits se oxidan y los recuerdos se pixelan. Este archivo no busca la perfección, sino la belleza de lo que se desvanece.</p>
      </div>
    </section>
  </main>

  <div class="music-player">
    <div class="music-header">
      <div class="vinyl" id="vinyl-disc"></div>
      <div>
        <p style="font-size:0.9rem; color:#e7d7c1;">Nocturne</p>
        <p style="font-size:0.6rem; color:#a68560; font-family:'IBM Plex Mono';">GRAMOPHONE UNIT</p>
      </div>
    </div>
    <audio id="audio-track" controls loop>
      <source src="cancion.mp3" type="audio/mpeg">
    </audio>
  </div>

  <footer>VANITAS ARCHIVE © 2026</footer>

  <script>
    // Resplandor del cursor
    const glow = document.querySelector(".cursor-glow");
    document.addEventListener("mousemove", (e) => {
      glow.style.left = e.clientX + "px";
      glow.style.top = e.clientY + "px";
    });

    // Generador de Polvo Dinámico
    const container = document.getElementById('dust-container');
    const particleCount = 50;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      
      // Valores aleatorios para cada mota de polvo
      const size = Math.random() * 3 + 'px';
      const posX = Math.random() * 100 + 'vw';
      const posY = Math.random() * 100 + 'vh';
      const delay = Math.random() * 20 + 's';
      const duration = Math.random() * 20 + 10 + 's';

      particle.style.width = size;
      particle.style.height = size;
      particle.style.left = posX;
      particle.style.top = posY;
      particle.style.animationDelay = delay;
      particle.style.animationDuration = duration;

      container.appendChild(particle);
    }

    // Control de audio y vinilo
    const audio = document.getElementById('audio-track');
    const vinyl = document.getElementById('vinyl-disc');
    audio.onplay = () => { vinyl.style.animationPlayState = 'running'; };
    audio.onpause = () => { vinyl.style.animationPlayState = 'paused'; };
  </script>
</body>
</html>
